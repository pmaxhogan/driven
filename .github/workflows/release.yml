name: Release

# Tag-triggered GA release pipeline (SPEC s19.3).
#
# Fires ONLY on a `v*` tag push (which release-please.yml creates when the
# "chore: release" PR is merged). Builds signed installers + updater artifacts
# for all four GA targets, attaches them to the GitHub Release, then publishes
# the per-target `updates/stable/.../update.json` manifests to the GitHub
# Release AND to Cloudflare Pages (driven-updates -> driven.maxhogan.dev) so the
# in-app updater can fetch them (SPEC s15.3 V1).
#
# COST POLICY: the full 4-row (3-OS) build matrix is allowed here because this
# is the tag-only (`v*`) path - it runs once per tagged release, not per push.
# The rolling dev channel (dev-channel.yml) is gated separately so main pushes
# do NOT silently trigger a 3-OS bundle.

on:
  push:
    tags:
      - "v*"

# tauri-action creates/updates the GitHub Release and uploads assets; the
# manifest job uploads further assets and deploys to CF Pages.
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    env:
      # The Tauri app boots the headless core whose state layer uses sqlx
      # compile-time-checked queries; release runners have no live DB, so
      # resolve against the committed .sqlx/ cache (same as ci.yml).
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # R2-P2-2: deterministic release notes for the GitHub Release body AND the
      # in-app changelog. Extract THIS tag's section from CHANGELOG.md (managed by
      # release-please) instead of hardcoding "See CHANGELOG.md for details." The
      # same notes are read back by the manifest job (gh release view --json body)
      # and fed to the updater manifest, so the in-app "View changelog" shows real
      # notes. We write to a file (multi-line, markdown) and load it into the step
      # output via the GITHUB_OUTPUT heredoc form (safe for arbitrary content).
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          # --allow-empty: never fail the release build if the section is missing;
          # fall back to a minimal pointer so the body is non-empty.
          node scripts/extract-changelog.mjs "${{ github.ref_name }}" \
            --out release-notes.md --allow-empty
          if [ ! -s release-notes.md ] || [ "$(tr -d '[:space:]' < release-notes.md)" = "" ]; then
            printf 'Release %s. See CHANGELOG.md for details.\n' "${{ github.ref_name }}" > release-notes.md
          fi
          {
            echo "body<<RELEASE_NOTES_EOF"
            cat release-notes.md
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "release notes bytes: $(wc -c < release-notes.md)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev javascriptcoregtk-4.1

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: pnpm install
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build + sign + release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing keypair. The password secret EXISTS but is empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Driven ${{ github.ref_name }}"
          # R2-P2-2: the real CHANGELOG.md section for this tag (deterministic),
          # not a hardcoded pointer - this is what the in-app changelog shows.
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          # tauri-action's own updater JSON (latest.json) is target-flat and
          # does NOT match Driven's channel-in-path endpoint layout
          # (SPEC s15). We generate the channel/target tree ourselves in the
          # publish-updater-manifest job, so suppress the built-in one to avoid
          # a confusing second manifest on the release. (The .sig files are
          # still uploaded - uploadUpdaterSignatures defaults to true - so the
          # manifest generator can reference them.)
          #
          # R2-P2-1: codex flagged this as the wrong key (claimed `includeUpdaterJson`).
          # VERIFIED against the authoritative tauri-action action.yml (dev branch)
          # AND Context7 docs: the input IS `uploadUpdaterJson` (default true);
          # `includeUpdaterJson` does NOT exist and would be silently IGNORED,
          # causing tauri-action to upload its own conflicting latest.json. So the
          # current key is correct - do NOT rename it. (False positive; see
          # design/CODEX_NOTES.md "M9 fix round 2".)
          uploadUpdaterJson: false
          # R3-P1-1: macOS `.app.tar.gz` is named from the `.app` bundle and
          # carries NO arch, so BOTH mac jobs would upload the SAME basename
          # (Driven.app.tar.gz) and collide in this flat release - dropping one
          # arch or advertising ARM as x86_64. Force the arch into EVERY uploaded
          # asset name (and its `.sig`) so the generator maps each mac arch to a
          # distinct darwin/<arch> manifest. The pattern is consistent with the
          # dev-channel rename + the generator's filename parser.
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][ext]"
          args: --target ${{ matrix.target }}

  publish-updater-manifest:
    name: publish stable update manifests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      # The live updates site whose OTHER channel must be preserved across the
      # whole-site `pages deploy` snapshot (R1-P1-7).
      UPDATES_BASE: https://driven.maxhogan.dev/updates
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # R1-P1-2: the generator reads bundles + `.sig` from a local dir, but the
      # matrix build artifacts live as GitHub Release assets. Download the
      # just-published release's assets into a flat dir so the generator has real
      # inputs (an empty dir would generate nothing).
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-assets \
            --pattern '*-setup.exe' --pattern '*-setup.exe.sig' \
            --pattern '*.msi' --pattern '*.msi.sig' \
            --pattern '*.app.tar.gz' --pattern '*.app.tar.gz.sig' \
            --pattern '*.AppImage' --pattern '*.AppImage.sig'
          echo "Downloaded assets:"; ls -la release-assets

      # R1-P1-6 + R2-P2-2: real release NOTES for the manifest's in-app changelog.
      # Extract THIS tag's section straight from CHANGELOG.md (deterministic,
      # independent of whether the build job set the body), and fall back to the
      # GitHub Release body only if the changelog has no section yet.
      - name: Resolve release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/extract-changelog.mjs "$RELEASE_TAG" \
            --out release-notes.md --allow-empty
          if [ ! -s release-notes.md ] || [ "$(tr -d '[:space:]' < release-notes.md)" = "" ]; then
            echo "CHANGELOG.md section empty; falling back to the GitHub Release body"
            gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --json body --jq '.body // ""' > release-notes.md
          fi
          echo "Notes bytes: $(wc -c < release-notes.md)"

      # R1-P1-1 / R1-P1-3: build site/updates/stable/<os>/<arch>/update.json from
      # the downloaded assets, with real notes + the v<tag> asset base URL.
      # R7-P1-1 (deploy path == fetch path): generate UNDER a `site/` staging root
      # so the tree is `site/updates/stable/...`. We deploy the `site/` parent
      # (not the bare `updates/` dir) so Cloudflare Pages serves the manifests at
      # `/updates/stable/...` - matching the app's fetch endpoint exactly. Deploying
      # the bare `updates/` dir made its CONTENTS the Pages root, stripping the
      # `/updates/` prefix and 404ing every updater check.
      # R3-P1-2: --require-targets makes the generator ERROR (failing this step,
      # so nothing is uploaded/deployed) unless EVERY V1 target produced a
      # manifest. A missing `.sig`, an asset collision, or a mapping miss can no
      # longer ship a PARTIAL stable update tree while CI stays green.
      - name: Generate stable update.json tree
        run: |
          set -euo pipefail
          node scripts/generate-update-json.mjs stable \
            --assets-dir release-assets \
            --notes-file release-notes.md \
            --out site/updates \
            --require-targets "windows-x86_64,darwin-x86_64,darwin-aarch64,linux-x86_64" \
            --base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"

      # R1-P1-3: attach the generated manifests to the GitHub Release too (a
      # CDN-of-last-resort + an auditable record of what was published for this
      # tag). Glob matches the FINAL layout
      # site/updates/stable/<os>/<arch>/update.json (R7-P1-1 staging root).
      - name: Upload manifests to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          # R3-P1-2 (defense in depth): the generator already errors on an
          # incomplete set, but assert here too that every required V1 manifest
          # exists before any upload - a partial tree must never reach the release.
          for t in windows/x86_64 darwin/x86_64 darwin/aarch64 linux/x86_64; do
            if [ ! -f "site/updates/stable/${t}/update.json" ]; then
              echo "::error::missing required manifest site/updates/stable/${t}/update.json"
              exit 1
            fi
          done
          files=(site/updates/stable/**/update.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no updates/stable/**/update.json files were generated"
            exit 1
          fi
          for f in "${files[@]}"; do
            arch="$(basename "$(dirname "$f")")"
            os="$(basename "$(dirname "$(dirname "$f")")")"
            # Flatten to a unique asset name; the canonical fetch path is CF Pages.
            cp "$f" "stable-${os}-${arch}-update.json"
            gh release upload "$RELEASE_TAG" "stable-${os}-${arch}-update.json" --clobber
          done

      # R1-P1-7: `pages deploy` replaces the WHOLE site snapshot, so before
      # deploying we overlay the OTHER channel's (dev) CURRENTLY-LIVE manifests
      # into the tree. Without this, a stable deploy would wipe updates/dev.
      # R7-P1-1: the tree-dir is the staging `site/updates` so the overlaid live
      # dev manifests land alongside the freshly generated stable ones under the
      # same `site/` parent we deploy.
      - name: Overlay live dev manifests (do not wipe the other channel)
        run: bash scripts/fetch-live-channel.sh dev site/updates "$UPDATES_BASE"

      # Publish the merged channel/target tree to Cloudflare Pages so
      # driven.maxhogan.dev/updates/stable/<os>/<arch>/update.json serves it
      # (SPEC s15.3 V1).
      # R7-P1-1: deploy the `site/` PARENT (which contains `updates/`), NOT the
      # bare `updates/` dir, so the served path keeps the `/updates/` prefix and
      # matches the app's fetch endpoint. Deploying `updates` made its contents the
      # Pages root (`/stable/...`), 404ing every updater check.
      - name: Deploy manifests to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=driven-updates --branch=main

      # R7-P1-1 (post-deploy smoke): prove the deployed manifests are actually
      # reachable at the EXACT public URL the in-app updater fetches
      # (`$UPDATES_BASE/stable/<os>/<arch>/update.json`). This is what catches the
      # deploy-path != fetch-path mismatch FOR REAL at release time: if the prefix
      # is wrong (or a manifest is missing), every required target 404s and the job
      # FAILS rather than shipping a silently-broken stable channel. Validates a
      # 200 AND a parseable JSON body carrying a `version` for each required target.
      - name: Smoke test deployed stable manifests
        run: |
          set -euo pipefail
          # Cloudflare Pages propagation can lag the deploy by a few seconds; a
          # bounded curl retry (NOT a sleep/poll loop) rides that out.
          fail=0
          for t in windows/x86_64 darwin/x86_64 darwin/aarch64 linux/x86_64; do
            url="${UPDATES_BASE}/stable/${t}/update.json"
            body="$(mktemp)"
            code="$(curl -sSL --retry 5 --retry-delay 4 --retry-all-errors \
              --connect-timeout 15 --max-time 120 \
              -o "$body" -w '%{http_code}' "$url" 2>/dev/null || true)"
            code="${code:-000}"
            if [ "$code" != "200" ]; then
              echo "::error::stable smoke: ${url} returned HTTP ${code} (expected 200)"
              fail=1
              rm -f "$body"
              continue
            fi
            if ! node -e 'const v=JSON.parse(require("fs").readFileSync(process.argv[1],"utf8"));if(!v||typeof v.version!=="string"||v.version.length===0){console.error("manifest has no version string");process.exit(1)}' "$body"; then
              echo "::error::stable smoke: ${url} returned 200 but not a valid update manifest (no version)"
              fail=1
            else
              echo "stable smoke OK: ${url} (version $(node -e 'console.log(JSON.parse(require("fs").readFileSync(process.argv[1],"utf8")).version)' "$body"))"
            fi
            rm -f "$body"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::stable updater smoke FAILED - the deployed manifests are not reachable at the app's fetch path"
            exit 1
          fi
          echo "all required stable manifests are reachable at ${UPDATES_BASE}/stable/<os>/<arch>/update.json"
