# cargo-deny config. Run via `cargo deny check` (or `just deny`).

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
ignore = [
    # GTK3 unmaintained — pulled in transitively by Tauri 2 on Linux.
    # Tauri ecosystem migration to GTK4 is upstream-tracked; nothing
    # to do at our layer.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # Other unmaintained transitive deps inherited from the Tauri / Linux
    # ecosystem (gtk-rs ATK / GDK / pango / proc-macro-error etc.). Tracked
    # upstream; nothing actionable at our layer.
    "RUSTSEC-2024-0370",
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
# Workspace-internal `path = "../..."` deps don't carry a version field
# in our crate manifests; that's intentional, not a wildcard escape.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
