# cargo-deny config. Run via `cargo deny check` (or `just deny`).

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
ignore = [
    # GTK3 unmaintained - pulled in transitively by Tauri 2 on Linux.
    # Tauri ecosystem migration to GTK4 is upstream-tracked; nothing
    # to do at our layer.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # Other unmaintained transitive deps inherited from the Tauri / Linux
    # ecosystem (gtk-rs ATK / GDK / pango / proc-macro-error etc.). Tracked
    # upstream; nothing actionable at our layer.
    "RUSTSEC-2024-0370",
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    # quick-xml DoS advisories, both fixed in quick-xml >=0.41.0:
    #   RUSTSEC-2026-0194 - quadratic run time when checking a start tag for
    #     duplicate attribute names.
    #   RUSTSEC-2026-0195 - unbounded namespace-declaration allocation in
    #     `NsReader` enables a memory-exhaustion denial of service.
    # We carry two vulnerable copies, each transitively pinned via an
    # intermediate that is ALREADY at its latest published crates.io version and
    # has not yet bumped its quick-xml requirement to >=0.41:
    #   quick-xml 0.37.5 <- tauri-winrt-notification 0.7.2 <- notify-rust
    #     <- tauri-plugin-notification <- driven-app
    #   quick-xml 0.39.4 <- plist 1.9.0 <- tauri-utils <- tauri <- driven-app
    # No bump path exists at our layer: quick-xml >=0.41 crosses 0.x incompat
    # boundaries upstream, so tauri-winrt-notification / plist must move first.
    # Exposure is low - these paths only parse local / OS-generated XML (Windows
    # toast notifications, macOS plists), never untrusted network input.
    # Added 2026-07-03; remove when #89 closes.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# M9b (SPEC s16 / P2-1): the `os_info` crate (telemetry coarse OS version) is
# MIT-licensed, already covered by the "MIT" allowance below - no new license
# allowance is required, and `cargo deny check` stays green with it added.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
# Workspace-internal `path = "../..."` deps don't carry a version field
# in our crate manifests; that's intentional, not a wildcard escape.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
