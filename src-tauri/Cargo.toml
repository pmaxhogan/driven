[package]
name = "driven-app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Driven Tauri shell: tray, IPC commands, updater glue, plugin wiring"
publish = false

[lib]
name = "driven_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-notification = "2"
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
rust-i18n = "3"
sys-locale = "0.3"

driven-core = { path = "../crates/driven-core" }
driven-drive = { path = "../crates/driven-drive" }
driven-crypto = { path = "../crates/driven-crypto" }
driven-power = { path = "../crates/driven-power" }
